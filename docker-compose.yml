services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: posto_barato
      POSTGRES_USER: posto_barato
      POSTGRES_PASSWORD: posto_barato
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U posto_barato -d posto_barato"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes: { postgres-data: {} }
