<p class="font-body-md text-body-md text-secondary mt-sm">Acesse sua conta para economizar hoje.</p>
</div>

<div class="flex flex-col gap-xs">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-2">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-[#F3F4F6] border-transparent rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:bg-surface transition-colors outline-none" id="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs relative">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface-variant" for="password">Senha</label>
<a class="font-label-bold text-label-bold text-primary hover:text-primary-fixed-dim transition-colors" href="#">Esqueceu a senha?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-2">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 bg-[#F3F4F6] border-transparent rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:bg-surface transition-colors outline-none" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-secondary px-2 hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>

                Entrar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-md my-xl">
<div class="h-px bg-surface-dim flex-1"></div>
