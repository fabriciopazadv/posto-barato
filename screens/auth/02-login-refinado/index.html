<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary-container/20 rounded-full blur-3xl pointer-events-none"></div>

<!-- Logo -->
<div class="mb-lg md:mb-xl animate-fade-in-up" style="opacity: 0; animation-delay: 0.1s;">
<img alt="Posto Barato Logo" class="h-20 w-auto object-contain drop-shadow-sm" src="https://lh3.googleusercontent.com/aida/AP1WRLtNDs6zSTsgFa8APiz-2PcWxpTv-EjW09bHTpZTwbPZ3Zi-sIWHEK1tNrZ8v7g4Y-gds33HoD_-ECDdNQz1HjXJRC26p6wx5T4A0U4I9ouZLL2SBEfHlVHwH1L4pmlZiHlsUKzp8PqH2c37_hhoNFp670XyuLO4fq_EYWQ_a7xau306d0QZzvfKpmqE7wNCQE2WY-9lWh3uEZC6uFglM97oQn4MnlMB3aH-zLvwc5Yi2No85qrJVnN0qtk"/>
</div>
<!-- Welcome Text -->

<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background">Bem-vindo ao Posto Barato</h1>
<p class="font-body-md text-body-md text-secondary mt-sm">Acesse sua conta para economizar hoje.</p>
</div>

<div class="flex flex-col gap-xs group">
<label class="font-label-bold text-label-bold text-on-surface-variant group-focus-within:text-primary transition-colors" for="email">E-mail</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-2 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-lowest/50 border border-surface-dim rounded-xl font-body-md text-body-md text-on-surface focus:border-transparent focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest focus:shadow-sm transition-all duration-300 outline-none" id="email" placeholder="seu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs relative group">
<div class="flex justify-between items-center">
<label class="font-label-bold text-label-bold text-on-surface-variant group-focus-within:text-primary transition-colors" for="password">Senha</label>
<a class="font-label-bold text-label-bold text-primary hover:text-primary-fixed-dim transition-colors" href="#">Esqueceu a senha?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-secondary px-2 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-[56px] pl-12 pr-12 bg-surface-container-lowest/50 border border-surface-dim rounded-xl font-body-md text-body-md text-on-surface focus:border-transparent focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest focus:shadow-sm transition-all duration-300 outline-none" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-secondary px-2 hover:text-on-surface transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-[56px] mt-xs bg-primary text-on-primary font-headline-md text-headline-md rounded-xl shadow-sm hover:shadow-md hover:bg-[#005c3e] hover:-translate-y-[1px] active:scale-[0.98] active:translate-y-0 transition-all duration-300 flex items-center justify-center gap-sm" type="submit">
                Entrar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="w-full flex items-center gap-md my-lg animate-fade-in-up" style="opacity: 0; animation-delay: 0.4s;">
<div class="h-px bg-surface-dim flex-1"></div>
<span class="font-label-bold text-label-bold text-secondary uppercase tracking-wider">ou continue com</span>
<div class="h-px bg-surface-dim flex-1"></div>
</div>
<!-- Social Logins -->
<div class="w-full flex flex-col gap-sm animate-fade-in-up" style="opacity: 0; animation-delay: 0.5s;">
<button class="w-full h-[48px] bg-white border border-surface-dim text-on-surface font-body-md text-body-md rounded-xl hover:border-primary/30 hover:bg-surface-bright hover:shadow-sm hover:-translate-y-[1px] active:scale-[0.98] active:translate-y-0 transition-all duration-300 flex items-center justify-center gap-md group">

<svg class="w-5 h-5 fill-current group-hover:scale-105 transition-transform" viewbox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.19 2.29-.88 3.56-.81 1.69.09 2.94.83 3.73 2.12-3.19 1.87-2.65 6.27.53 7.55-.8 2.01-1.92 3.95-2.9 5.31zm-2.85-15.11c-.13-2.22 1.63-4.08 3.76-4.17.26 2.39-1.93 4.25-3.76 4.17z"></path></svg>
                Entrar com Apple

</div>

<div class="mt-lg w-full animate-fade-in-up" style="opacity: 0; animation-delay: 0.6s;">
<a class="w-full h-[48px] bg-surface-container-low/80 hover:bg-surface-variant text-on-surface rounded-xl flex items-center justify-center gap-2 transition-all duration-300 border border-transparent hover:border-surface-dim" href="#">
<span class="font-body-md text-secondary">Não tem uma conta?</span>
<span class="font-label-bold text-primary">Cadastre-se</span>
</a>
